spring:
  profiles:
    active: local
  application:
    name: inventory-billing-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # STRICT RULE: never use create or update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api/v1

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:dGhpcxMxc2VjcmV0a2V5Zm9yaW52ZW50b3J5YmlsbGluZ3N5c3RlbXVzaW5nSFMyNTZhbGdvcml0aG0hMjAyNg==}
      expiration: 86400000        # 24 hours in ms
      refresh-expiration: 604800000 # 7 days in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    default-models-expand-depth: 1
    persist-authorization: true
  show-actuator: false
  packages-to-scan: com.inventory.app
