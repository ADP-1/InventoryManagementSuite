spring:
  application:
    name: inventory-billing-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # STRICT RULE: never use create or update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# JWT Settings Placeholder
jwt:
  secret: ${JWT_SECRET:ReplaceWithYourVerySecureBase64EncodedSecretKeyForJwtSigningUseAtLeast256BitsLongSecretString}
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours
